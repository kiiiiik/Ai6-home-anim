<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TERRAIN / VISUALISATION FADE FOND</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F2F3FF;
    --panel-bg: rgba(10, 14, 22, 0.85);
    --panel-border: rgba(91, 123, 255, 0.2);
    --text: #e0e6ff;
    --accent: #5B7BFF;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: 'IBM Plex Mono', monospace; overflow: hidden; }
  #canvas { position: fixed; inset: 0; display: block; z-index: 0; }
  
  .panel { 
    position: fixed; top: 24px; right: 24px; width: 300px; 
    background: var(--panel-bg); backdrop-filter: blur(20px); 
    border: 1px solid var(--panel-border); padding: 20px; 
    font-size: 11px; z-index: 10; display: none; 
    max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
  }

  .group-title { font-size: 9px; letter-spacing: 0.2em; color: #7a82a8; margin: 15px 0 10px 0; display: flex; align-items: center; gap: 8px; text-transform: uppercase; }
  .group-title::after { content: ''; flex: 1; height: 1px; background: var(--panel-border); }
  
  .control { margin-bottom: 10px; }
  .control label { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .control label .value { color: var(--accent); font-weight: 600; }
  
  input[type="range"] { -webkit-appearance: none; width: 100%; height: 1px; background: #1f2d7a; outline: none; }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: var(--accent); border-radius: 50%; cursor: pointer; }

  .color-control { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .color-wrapper { width: 30px; height: 18px; border: 1px solid var(--panel-border); overflow: hidden; position: relative; }
  input[type="color"] { position: absolute; width: 200%; height: 200%; top: -50%; left: -50%; cursor: pointer; border: none; background: none; }

  .btn-save {
    display: block; width: 100%; padding: 10px; background: var(--accent); color: white;
    border: none; border-radius: 2px; font-family: inherit; font-size: 10px; font-weight: 600;
    letter-spacing: 0.1em; cursor: pointer; margin-top: 20px; transition: opacity 0.2s;
  }
  .btn-save:hover { opacity: 0.8; }

  .hint { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); font-size: 9px; color: var(--accent); letter-spacing: 0.2em; opacity: 0.6; pointer-events: none; }
  .loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg); z-index: 200; transition: opacity 0.5s; }
  .loading.hidden { opacity: 0; pointer-events: none; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div class="hint">CONFIGURATEUR [ESC]</div>
<div id="loading" class="loading"><div style="color:var(--accent); letter-spacing: 0.3em; font-size: 10px;">OPTIMISATION DU FADE...</div></div>

<div class="panel" id="uiPanel">
  <div style="font-weight: 600; color: var(--accent); letter-spacing: 0.2em; margin-bottom: 20px; font-size: 12px;">PARAMÈTRES</div>

  <div class="group-title">ENVIRONNEMENT</div>
  <div class="control">
    <label>Début du Fade <span class="value" id="fogStartVal">0</span></label>
    <input type="range" id="fogStart" min="0" max="20" step="0.1" value="0">
  </div>

  <div class="group-title">TOPOGRAPHIE</div>
  <div class="control">
    <label>Rapprochement <span class="value" id="topoSpacingVal">108</span></label>
    <input type="range" id="topoSpacing" min="10" max="300" step="1" value="108">
  </div>
  <div class="control">
    <label>Finesse <span class="value" id="topoWidthVal">0.10</span></label>
    <input type="range" id="topoWidth" min="0.05" max="1.5" step="0.05" value="0.10">
  </div>
  <div class="color-control">
    <label>Couleur traits</label>
    <div class="color-wrapper"><input type="color" id="topoColor" value="#6289FF"></div>
  </div>

  <div class="group-title">POINTS</div>
  <div class="control">
    <label>Densité <span class="value" id="densityVal">302</span></label>
    <input type="range" id="density" min="50" max="600" step="1" value="302">
  </div>
  <div class="control">
    <label>Taille <span class="value" id="pointSizeVal">0.015</span></label>
    <input type="range" id="pointSize" min="0.005" max="0.1" step="0.001" value="0.015">
  </div>
  <div class="color-control">
    <label>Couleur base</label>
    <div class="color-wrapper"><input type="color" id="pointColor" value="#0033FF"></div>
  </div>

  <div class="group-title">ONDE</div>
  <div class="control">
    <label>Vitesse <span class="value" id="waveSpeedVal">0.4</span></label>
    <input type="range" id="waveSpeed" min="0.1" max="5.0" step="0.1" value="0.4">
  </div>
  <div class="control">
    <label>Fréquence <span class="value" id="waveSizeVal">0.5</span></label>
    <input type="range" id="waveSize" min="0.5" max="10.0" step="0.1" value="0.5">
  </div>
  <div class="color-control">
    <label>Couleur onde</label>
    <div class="color-wrapper"><input type="color" id="waveColor" value="#1AFED0"></div>
  </div>

  <div class="group-title">MAISONS</div>
  <div class="control">
    <label>Opacité <span class="value" id="houseAlphaVal">0.65</span></label>
    <input type="range" id="houseAlpha" min="0" max="1" step="0.05" value="0.65">
  </div>
  <div class="color-control">
    <label>Couleur</label>
    <div class="color-wrapper"><input type="color" id="houseColor" value="#0033FF"></div>
  </div>

  <button class="btn-save" id="saveBtn">SAUVEGARDER CONFIG</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
    "three-mesh-bvh": "https://unpkg.com/three-mesh-bvh@0.7.0/build/index.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { computeBoundsTree, disposeBoundsTree, acceleratedRaycast } from 'three-mesh-bvh';

THREE.BufferGeometry.prototype.computeBoundsTree = computeBoundsTree;
THREE.BufferGeometry.prototype.disposeBoundsTree = disposeBoundsTree;
THREE.Mesh.prototype.raycast = acceleratedRaycast;

/* ====================== SETUP SCENE ====================== */
const scene = new THREE.Scene();
const bgColor = new THREE.Color(0xF2F3FF);
scene.background = bgColor;

// Initialisé avec Début du Fade = 0
scene.fog = new THREE.Fog(bgColor, 0.0, 11.0);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(1.179, 1.808, 2.840);

const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(-0.361, 0.285, 0.235);
controls.enableRotate = false; controls.enableZoom = false; controls.enablePan = false;
controls.enableDamping = true;

scene.add(new THREE.AmbientLight(0xffffff, 0.8));
const sun = new THREE.DirectionalLight(0xffffff, 1.2);
sun.position.set(5, 10, 5);
scene.add(sun);

/* ====================== SHADERS ====================== */
// Initialisé avec les valeurs de l'image
const topoUniforms = { uColor: { value: new THREE.Color(0x6289FF) }, uSpacing: { value: 108.0 }, uLineWidth: { value: 0.1 } };
const waveUniforms = { uTime: { value: 0 }, uBaseColor: { value: new THREE.Color(0x0033FF) }, uWaveColor: { value: new THREE.Color(0x1AFED0) }, uWaveSpeed: { value: 0.4 }, uWaveSize: { value: 0.5 }, uPointSize: { value: 0.015 } };

const topoMaterial = new THREE.ShaderMaterial({
  uniforms: { ...topoUniforms, ...THREE.UniformsLib['fog'] },
  vertexShader: `
    #include <fog_pars_vertex>
    varying float vY;
    void main() {
      vY = position.y;
      vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
      gl_Position = projectionMatrix * mvPosition;
      #include <fog_vertex>
    }
  `,
  fragmentShader: `
    #include <fog_pars_fragment>
    uniform vec3 uColor;
    uniform float uSpacing;
    uniform float uLineWidth;
    varying float vY;
    void main() {
      float coord = vY * uSpacing;
      float fraction = fract(coord);
      float dist = abs(fraction - 0.5);
      float delta = fwidth(coord);
      float line = smoothstep(delta * (uLineWidth + 0.5), delta * (uLineWidth - 0.5), dist);
      if (line < 0.1) discard;
      gl_FragColor = vec4(uColor, line);
      #include <fog_fragment>
    }
  `,
  transparent: true, side: THREE.DoubleSide, extensions: { derivatives: true }
});

/* ====================== LOADING & LOGIC ====================== */
let terrainCollisionMesh, pointsObject, housesGroup = new THREE.Group();
const parallaxGroup = new THREE.Group(); 
scene.add(parallaxGroup);
parallaxGroup.add(housesGroup);

async function load() {
  const loader = new GLTFLoader();
  const [tData, mData] = await Promise.all([loader.loadAsync('terrain.glb'), loader.loadAsync('maisons.glb')]);

  const tCol = tData.scene.clone();
  tCol.traverse(c => { if(c.isMesh) { c.geometry.computeBoundsTree(); c.visible = false; } });
  parallaxGroup.add(tCol); terrainCollisionMesh = tCol;
  
  tData.scene.traverse(c => { if(c.isMesh) c.material = topoMaterial; });
  parallaxGroup.add(tData.scene);

  housesGroup.add(mData.scene);
  
  // Priorité au LocalStorage si existant, sinon garde les défauts définis ci-dessus
  loadSavedConfig();
  updateHouses();
  regenerateGrid();
  document.getElementById('loading').classList.add('hidden');
}

function updateHouses() {
  const color = new THREE.Color(document.getElementById('houseColor').value);
  const alpha = parseFloat(document.getElementById('houseAlpha').value);
  housesGroup.traverse(c => {
    if(c.isMesh) c.material = new THREE.MeshStandardMaterial({ color, transparent: true, opacity: alpha, fog: true });
  });
}

function regenerateGrid() {
  if (!terrainCollisionMesh) return;
  if (pointsObject) parallaxGroup.remove(pointsObject);

  const density = parseInt(document.getElementById('density').value);
  const bbox = new THREE.Box3().setFromObject(terrainCollisionMesh);
  const size = bbox.getSize(new THREE.Vector3());
  const nx = density, nz = Math.round(density * (size.z / size.x));
  const stepX = size.x / nx, stepZ = size.z / nz;
  const positions = [];
  const raycaster = new THREE.Raycaster();
  const down = new THREE.Vector3(0, -1, 0);

  for (let i = 0; i <= nx; i++) {
    for (let j = 0; j <= nz; j++) {
      const x = bbox.min.x + i * stepX;
      const z = bbox.min.z + j * stepZ;
      raycaster.set(new THREE.Vector3(x, bbox.max.y + 1, z), down);
      const hits = raycaster.intersectObject(terrainCollisionMesh, true);
      if (hits.length > 0) positions.push(hits[0].point.x, hits[0].point.y, hits[0].point.z);
    }
  }

  const geom = new THREE.BufferGeometry();
  geom.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  pointsObject = new THREE.Points(geom, new THREE.ShaderMaterial({
    uniforms: { ...waveUniforms, ...THREE.UniformsLib['fog'], uTexture: { value: createTex() } },
    vertexShader: `
      #include <fog_pars_vertex>
      uniform float uTime; uniform float uWaveSpeed; uniform float uWaveSize; uniform float uPointSize;
      varying float vWave;
      void main() {
        vec3 pos = position;
        float dist = distance(pos.xz, vec2(0.0));
        float wave = sin(dist * uWaveSize - uTime * uWaveSpeed * 3.0);
        vWave = smoothstep(0.6, 1.0, wave);
        vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
        gl_PointSize = uPointSize * (300.0 / -mvPosition.z) * (1.0 + vWave * 1.2);
        gl_Position = projectionMatrix * mvPosition;
        #include <fog_vertex>
      }
    `,
    fragmentShader: `
      #include <fog_pars_fragment>
      uniform vec3 uBaseColor; uniform vec3 uWaveColor; uniform sampler2D uTexture;
      varying float vWave;
      void main() {
        vec3 color = mix(uBaseColor, uWaveColor, vWave);
        vec4 tex = texture2D(uTexture, gl_PointCoord);
        if (tex.a < 0.1) discard;
        gl_FragColor = vec4(color, tex.a);
        #include <fog_fragment>
      }
    `,
    transparent: true, depthWrite: false
  }));
  parallaxGroup.add(pointsObject);
}

function createTex() {
  const c = document.createElement('canvas'); c.width = c.height = 64;
  const x = c.getContext('2d'); x.fillStyle = '#fff'; x.beginPath(); x.arc(32,32,30,0,Math.PI*2); x.fill();
  return new THREE.CanvasTexture(c);
}

/* ====================== UI & CONFIG ====================== */
const ui = document.getElementById('uiPanel');
window.addEventListener('keydown', (e) => { if(e.key === "Escape") ui.style.display = ui.style.display === 'block' ? 'none' : 'block'; });

document.getElementById('saveBtn').addEventListener('click', () => {
  const config = {};
  document.querySelectorAll('input').forEach(input => config[input.id] = input.value);
  localStorage.setItem('terrain_config_v2', JSON.stringify(config));
  const btn = document.getElementById('saveBtn');
  btn.textContent = "CONFIGURATON ENREGISTRÉE !";
  setTimeout(() => btn.textContent = "SAUVEGARDER CONFIG", 1500);
});

function loadSavedConfig() {
  const saved = localStorage.getItem('terrain_config_v2');
  if (!saved) return;
  const config = JSON.parse(saved);
  for (const id in config) {
    const el = document.getElementById(id);
    if (el) {
      el.value = config[id];
      if (document.getElementById(id + 'Val')) document.getElementById(id + 'Val').textContent = config[id];
    }
  }
  // Sync Three.js
  scene.fog.near = parseFloat(config['fogStart']);
  scene.fog.far = scene.fog.near + 11.0; 
  topoUniforms.uSpacing.value = parseFloat(config['topoSpacing']);
  topoUniforms.uLineWidth.value = parseFloat(config['topoWidth']);
  topoUniforms.uColor.value.set(config['topoColor']);
  waveUniforms.uPointSize.value = parseFloat(config['pointSize']);
  waveUniforms.uBaseColor.value.set(config['pointColor']);
  waveUniforms.uWaveSpeed.value = parseFloat(config['waveSpeed']);
  waveUniforms.uWaveSize.value = parseFloat(config['waveSize']);
  waveUniforms.uWaveColor.value.set(config['waveColor']);
}

// Listeners
document.getElementById('fogStart').addEventListener('input', e => {
  const v = parseFloat(e.target.value);
  scene.fog.near = v;
  scene.fog.far = v + 11.0;
  document.getElementById('fogStartVal').textContent = v;
});
document.getElementById('topoSpacing').addEventListener('input', e => { topoUniforms.uSpacing.value = parseFloat(e.target.value); document.getElementById('topoSpacingVal').textContent = e.target.value; });
document.getElementById('topoWidth').addEventListener('input', e => { topoUniforms.uLineWidth.value = parseFloat(e.target.value); document.getElementById('topoWidthVal').textContent = e.target.value; });
document.getElementById('topoColor').addEventListener('input', e => topoUniforms.uColor.value.set(e.target.value));
document.getElementById('density').addEventListener('change', regenerateGrid);
document.getElementById('density').addEventListener('input', e => document.getElementById('densityVal').textContent = e.target.value);
document.getElementById('pointSize').addEventListener('input', e => { waveUniforms.uPointSize.value = parseFloat(e.target.value); document.getElementById('pointSizeVal').textContent = e.target.value; });
document.getElementById('pointColor').addEventListener('input', e => waveUniforms.uBaseColor.value.set(e.target.value));
document.getElementById('waveSpeed').addEventListener('input', e => { waveUniforms.uWaveSpeed.value = parseFloat(e.target.value); document.getElementById('waveSpeedVal').textContent = e.target.value; });
document.getElementById('waveSize').addEventListener('input', e => { waveUniforms.uWaveSize.value = parseFloat(e.target.value); document.getElementById('waveSizeVal').textContent = e.target.value; });
document.getElementById('waveColor').addEventListener('input', e => waveUniforms.uWaveColor.value.set(e.target.value));
document.getElementById('houseAlpha').addEventListener('input', (e) => { updateHouses(); document.getElementById('houseAlphaVal').textContent = e.target.value; });
document.getElementById('houseColor').addEventListener('input', updateHouses);

/* ====================== ANIMATION ====================== */
let mx = 0, my = 0;
window.addEventListener('mousemove', (e) => { mx = (e.clientX/window.innerWidth-0.5)*0.4; my = (e.clientY/window.innerHeight-0.5)*0.4; });

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  waveUniforms.uTime.value = clock.getElapsedTime();
  parallaxGroup.rotation.y += (mx * 0.12 - parallaxGroup.rotation.y) * 0.1;
  parallaxGroup.rotation.x += (my * 0.12 - parallaxGroup.rotation.x) * 0.1;
  controls.update(); renderer.render(scene, camera);
}

load(); animate();
window.addEventListener('resize', () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
</script>
</body>
</html>
